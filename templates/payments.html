{% extends "base.html" %}

{% block content %}

<div class="form-card">

    <h2>Платежи</h2>

    <div class="commission-warning">
        Комиссия на категорию «Игры»:
        {{ game_commission }}%
    </div>

    <form method="POST">

        {{ form.hidden_tag() }}

        {{ form.category(class="input-field") }}

        {{ form.amount(class="input-field") }}

        {{ form.submit(class="btn secondary full") }}

    </form>

</div>

{% endblock %}
