{% extends "base.html" %}

{% block content %}

<div class="subscription-page">

    <div class="subscription-card">

        <div class="subscription-header">
            <h1>EduBank Premium</h1>
            <p>Сниженные комиссии и премиум возможности</p>
        </div>

        <div class="subscription-price">
            150₽
            <span>/ месяц</span>
        </div>

        <div class="subscription-benefits">

            <div class="benefit-item">
                <h3>Переводы</h3>
                <p>Комиссия 1% вместо 3%</p>
            </div>

            <div class="benefit-item">
                <h3>Игры</h3>
                <p>Комиссия 3% вместо 5%</p>
            </div>

        </div>

        {% if subscription.active %}

        <div class="premium-active">
            Подписка активна
        </div>

        {% else %}

        <form method="POST">
            {{ form.hidden_tag() }}

            <button class="premium-btn">
                Оформить подписку
            </button>
        </form>

        {% endif %}

    </div>

</div>

{% endblock %}
